name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "The version to release (e.g., '20260414')."
        type: string
      sha:
        description: "The full SHA of the commit to be released (e.g., 'd09ff921d92d6da8d8a608eaa850dc8c0f638194')."
        type: string
      dry-run:
        description: "Dry run? Tests the release process without publishing."
        default: false
        required: false
        type: boolean

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    environment: release
    steps:
      - run: echo "Release approved"

  release:
    name: Release
    needs: release-gate
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: depot-ubuntu-24.04-8
    environment: release

    permissions:
      contents: write
      packages: write
      # Permissions used for actions/attest-build-provenance
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: true # needed for git operations below

      - uses: extractions/setup-crate@4993624604c307fbca528d28a3c8b60fa5ecc859 # v1.4.0
        with:
          repo: casey/just
          version: 1.42.4

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      # Perform a release in dry-run mode.
      - run: just release-dry-run ${GH_TOKEN} ${GITHUB_EVENT_INPUTS_SHA} ${GITHUB_EVENT_INPUTS_TAG}
        if: ${{ github.event.inputs.dry-run == 'true' }}
        env:
          GITHUB_EVENT_INPUTS_SHA: ${{ github.event.inputs.sha }}
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}
      - name: Configure Git identity
        if: ${{ github.event.inputs.dry-run == 'false' }}
        run: |
          git config --global user.name "$GITHUB_ACTOR"
          git config --global user.email "$GITHUB_ACTOR@users.noreply.github.com"

      # Fetch the commit so that it exists locally.
      - name: Fetch commit
        if: ${{ github.event.inputs.dry-run == 'false' }}
        run: git fetch origin ${GITHUB_EVENT_INPUTS_SHA}
        env:
          GITHUB_EVENT_INPUTS_SHA: ${{ github.event.inputs.sha }}

      # Associate the commit with the tag.
      - name: Create tag
        if: ${{ github.event.inputs.dry-run == 'false' }}
        run: git tag ${GITHUB_EVENT_INPUTS_TAG} ${GITHUB_EVENT_INPUTS_SHA}
        env:
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}
          GITHUB_EVENT_INPUTS_SHA: ${{ github.event.inputs.sha }}
      - name: Push tag
        if: ${{ github.event.inputs.dry-run == 'false' }}
        run: git push origin ${GITHUB_EVENT_INPUTS_TAG}
        env:
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}

      # Create a GitHub release.
      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry-run == 'false' }}
        run: just release-create ${GITHUB_EVENT_INPUTS_TAG}
        env:
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}

      # Uploading the relevant artifact to the GitHub release.
      - run: just release-run ${GH_TOKEN} ${GITHUB_EVENT_INPUTS_SHA} ${GITHUB_EVENT_INPUTS_TAG}
        if: ${{ github.event.inputs.dry-run == 'false' }}
        env:
          GITHUB_EVENT_INPUTS_SHA: ${{ github.event.inputs.sha }}
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}
      - name: Generate attestations
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        if: ${{ github.event.inputs.dry-run == 'false' }}
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.tar.zst

      - name: Publish to Astral mirror
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MIRROR_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MIRROR_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.MIRROR_R2_CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          AWS_DEFAULT_REGION: auto
          R2_BUCKET: ${{ secrets.MIRROR_R2_BUCKET_NAME }}
          PROJECT: python-build-standalone
          VERSION: ${{ github.event.inputs.tag }}
          DRY_RUN: ${{ github.event.inputs.dry-run }}
        run: |
          if [ "${DRY_RUN}" = 'true' ]; then
            just release-upload-mirror-dry-run \
              ${R2_BUCKET} \
              github/${PROJECT}/releases/download/${VERSION}/ \
              ${VERSION}
          else
            just release-upload-mirror \
              ${R2_BUCKET} \
              github/${PROJECT}/releases/download/${VERSION}/ \
              ${VERSION}
          fi

      - name: Generate versions metadata
        if: ${{ github.event.inputs.dry-run == 'false' }}
        env:
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run generate-version-metadata.py > dist/versions.ndjson

      - name: Validate metadata
        if: ${{ github.event.inputs.dry-run == 'false' }}
        run: |
          echo "Generated $(wc -l < dist/versions.ndjson) version entries"
          head -c 1000 dist/versions.ndjson

      - name: Set branch name
        if: ${{ github.event.inputs.dry-run == 'false' }}
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: echo "BRANCH_NAME=update-versions-$TAG-$(date +%s)" >> $GITHUB_ENV

      - name: Clone versions repo
        if: ${{ github.event.inputs.dry-run == 'false' }}
        run: git clone https://${{ secrets.ASTRAL_VERSIONS_PAT }}@github.com/astral-sh/versions.git astral-versions

      - name: Update versions
        if: ${{ github.event.inputs.dry-run == 'false' }}
        run: cat dist/versions.ndjson | uv run astral-versions/scripts/insert-versions.py --name python-build-standalone

      - name: Commit versions
        if: ${{ github.event.inputs.dry-run == 'false' }}
        env:
          TAG: ${{ github.event.inputs.tag }}
        working-directory: astral-versions
        run: |
          git config user.name "astral-versions-bot"
          git config user.email "176161322+astral-versions-bot@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add -A
          git commit -m "Update python-build-standalone to $TAG"

      - name: Create Pull Request
        if: ${{ github.event.inputs.dry-run == 'false' }}
        env:
          TAG: ${{ github.event.inputs.tag }}
          GH_TOKEN: ${{ secrets.ASTRAL_VERSIONS_PAT }}
        working-directory: astral-versions
        run: |
          pull_request_title="Update python-build-standalone versions for $TAG"

          gh pr list --state open --json title --jq ".[] | select(.title == \"$pull_request_title\") | .number" | \
            xargs -I {} gh pr close {}

          git push origin "$BRANCH_NAME"

          gh pr create --base main --head "$BRANCH_NAME" \
            --title "$pull_request_title" \
            --body "Automated versions update for $TAG" \
            --label "automation"

      - name: Merge Pull Request
        if: ${{ github.event.inputs.dry-run == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.ASTRAL_VERSIONS_PAT }}
        working-directory: astral-versions
        run: |
          # Wait for PR to be created before merging
          sleep 10
          gh pr merge --squash "$BRANCH_NAME"

